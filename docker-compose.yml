# Local infrastructure for MVP development
services:
  postgres:
    image: postgres:16-alpine
    container_name: egi-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: egi_monitoring
      POSTGRES_USER: egi
      POSTGRES_PASSWORD: change_me_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egi -d egi_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: egi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: egi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: change_me_minio
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
