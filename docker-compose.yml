# Local/private infrastructure. Application services can use localhost; do not
# expose database, Redis, or MinIO directly on a VPS.
x-logging: &default-logging
  driver: local
  options:
    max-size: "50m"
    max-file: "10"

services:
  postgres:
    image: postgres:16-alpine
    container_name: egi-postgres
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: egi_monitoring
      POSTGRES_USER: egi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egi -d egi_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: egi-redis
    restart: unless-stopped
    logging: *default-logging
    command:
      - sh
      - -c
      - >-
        if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server --requirepass
        "$$REDIS_PASSWORD"; else exec redis-server; fi
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: egi-minio
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?Set S3_SECRET_KEY in .env}
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
