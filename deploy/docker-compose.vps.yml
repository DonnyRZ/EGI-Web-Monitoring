name: egi-web-monitoring

x-logging: &egi-logging
  driver: local
  options:
    max-size: "50m"
    max-file: "10"

x-app-build: &app-build
  context: ..
  dockerfile: deploy/Dockerfile.service

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *egi-logging
    command: >-
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server
      --requirepass "$$REDIS_PASSWORD"; else exec redis-server; fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - egi_vps_redis:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    logging: *egi-logging
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:31012:9000"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?Set S3_SECRET_KEY}
    volumes:
      - egi_vps_minio:/data

  backend:
    build:
      <<: *app-build
      args:
        BASE_IMAGE: node:20-bookworm-slim
        SERVICE: "@egi/backend"
    restart: unless-stopped
    logging: *egi-logging
    command: >-
      sh -c 'npm run prisma:migrate -w @egi/database
      && npm run prisma:seed -w @egi/database
      && npm run start:prod -w @egi/backend'
    environment:
      NODE_ENV: production
      BACKEND_PORT: 3001
      API_PREFIX: api
      DATABASE_URL: postgresql://${DB_USER:?Set DB_USER}:${DB_PASSWORD:?Set DB_PASSWORD}@${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/${DB_NAME:-egi_monitoring}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-egi-monitoring}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_SIGNED_URL_EXPIRES_SEC: ${S3_SIGNED_URL_EXPIRES_SEC:-900}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
    ports:
      - "127.0.0.1:31011:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.status < 500 ? 0 : 1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      <<: *app-build
      args:
        BASE_IMAGE: node:20-bookworm-slim
        SERVICE: "@egi/frontend"
        NEXT_PUBLIC_API_URL: /api
    restart: unless-stopped
    logging: *egi-logging
    command: ["npm", "run", "start", "-w", "@egi/frontend"]
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:31010:3010"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3010/login').then(r=>process.exit(r.status < 500 ? 0 : 1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  scheduler:
    build:
      <<: *app-build
      args:
        BASE_IMAGE: node:20-bookworm-slim
        SERVICE: "@egi/scheduler"
    restart: unless-stopped
    logging: *egi-logging
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:?Set DB_USER}:${DB_PASSWORD:?Set DB_PASSWORD}@${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/${DB_NAME:-egi_monitoring}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      SCHEDULER_TICK_SECONDS: ${SCHEDULER_TICK_SECONDS:-15}
      MONITORING_INTERVAL_MINUTES: ${MONITORING_INTERVAL_MINUTES:-5}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      <<: *app-build
      args:
        BASE_IMAGE: mcr.microsoft.com/playwright:v1.61.1-noble
        SERVICE: "@egi/worker"
    restart: unless-stopped
    logging: *egi-logging
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:?Set DB_USER}:${DB_PASSWORD:?Set DB_PASSWORD}@${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/${DB_NAME:-egi_monitoring}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-egi-monitoring}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_SIGNED_URL_EXPIRES_SEC: ${S3_SIGNED_URL_EXPIRES_SEC:-900}
      HTTP_TIMEOUT_MS: ${HTTP_TIMEOUT_MS:-15000}
      BROWSER_TIMEOUT_MS: ${BROWSER_TIMEOUT_MS:-45000}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-3}
      LATE_JOB_SKIP_MS: ${LATE_JOB_SKIP_MS:-240000}
      RETENTION_CRON: ${RETENTION_CRON:-0 2 * * *}
      RETENTION_MONITORING_RESULTS_DAYS: ${RETENTION_MONITORING_RESULTS_DAYS:-90}
      RETENTION_SCREENSHOTS_DAYS: ${RETENTION_SCREENSHOTS_DAYS:-1}
      RETENTION_NOTIFICATIONS_DAYS: ${RETENTION_NOTIFICATIONS_DAYS:-90}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

volumes:
  egi_vps_redis:
  egi_vps_minio:
