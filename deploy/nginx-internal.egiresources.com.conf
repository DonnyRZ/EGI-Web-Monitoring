server {
    listen 80;
    listen [::]:80;
    server_name internal.egiresources.com;

    client_max_body_size 1m;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;

    # Private MinIO object access for browser-downloadable signed URLs.
    # The host port is loopback-only; this vhost is the only public entrypoint.
    location ^~ /egi-monitoring/ {
        proxy_pass http://127.0.0.1:31012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    location = /api/auth/login {
        proxy_pass http://127.0.0.1:31011;
        include proxy_params;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:31011;
        include proxy_params;
    }

    location /docs/ {
        proxy_pass http://127.0.0.1:31011;
        include proxy_params;
    }

    location / {
        proxy_pass http://127.0.0.1:31010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        include proxy_params;
    }
}
