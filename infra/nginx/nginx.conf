# Reverse proxy template for a single VPS. Terminate TLS in this server block
# (or at an upstream load balancer) before exposing the application publicly.
# In Docker, resolve `frontend` and `backend` to their service names. For host
# processes, replace them with 127.0.0.1 in a deployment-specific copy.
events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=20r/s;
  # Credential endpoints need a much lower sustained rate than normal API use.
  limit_req_zone $binary_remote_addr zone=login_per_ip:10m rate=5r/m;

  upstream frontend_upstream { server frontend:3000; }
  upstream backend_upstream { server backend:3001; }

  server {
    listen 80;
    server_name _;
    client_max_body_size 1m;

    # These headers are safe for the API and do not interfere with Swagger.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;

    location = /api/auth/login {
      limit_req zone=login_per_ip burst=10 nodelay;
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location /api/ {
      limit_req zone=api_per_ip burst=40 nodelay;
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location /docs/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 60s;
    }
  }
}
